version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BLOG_DATA_ROOT=/root/blog-nevigation
    volumes:
      - /root/blog-nevigation:/root/blog-nevigation
    restart: unless-stopped

  # 可选：使用已构建的镜像
  # app:
  #   image: ghcr.io/242282218/blog-nevigation:latest
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - BLOG_DATA_ROOT=/root/blog-nevigation

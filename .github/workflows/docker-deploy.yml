name: Docker Build & Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: '构建完成后是否继续部署'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROJECT_DIR: ./blog-nevigation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_DIR }}
          file: ${{ env.PROJECT_DIR }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to Production
    needs: build-and-push
    if: >-
      secrets.DEPLOY_HOST != '' &&
      secrets.DEPLOY_USER != '' &&
      secrets.DEPLOY_SSH_KEY != '' &&
      secrets.DEPLOY_PATH != '' &&
      (
        (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
      )
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.SITE_URL || 'https://blog.example.com' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}"
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

            echo "========================================="
            echo "Deployment started at ${TIMESTAMP}"
            echo "Image: ${IMAGE}"
            echo "Deploy dir: ${DEPLOY_DIR}"
            echo "========================================="

            cd "${DEPLOY_DIR}"

            PREV_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$(docker compose -f compose.prod.yaml ps -q app 2>/dev/null)" 2>/dev/null || echo "none")
            echo "Previous image digest: ${PREV_DIGEST}"

            echo "Pulling latest image..."
            docker pull "${IMAGE}"

            echo "Restarting service..."
            DEPLOY_IMAGE="${IMAGE}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans

            echo "Waiting for health check..."
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl --fail --silent --max-time 5 http://127.0.0.1:3000/ > /dev/null 2>&1; then
                HEALTHY=true
                echo "Health check passed after $((i*2)) seconds"
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" = "false" ]; then
              echo "========================================="
              echo "❌ Health check FAILED! Initiating rollback..."
              echo "========================================="

              docker compose -f compose.prod.yaml logs --tail=50 app || true

              if [ "${PREV_DIGEST}" != "none" ]; then
                echo "Rolling back to previous image: ${PREV_DIGEST}"
                DEPLOY_IMAGE="${PREV_DIGEST}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans
                echo "Rollback complete. Service may be running on previous version."
              fi

              exit 1
            fi

            echo "Cleaning up dangling images..."
            docker image prune -f || true

            echo "========================================="
            echo "✅ Deployment successful at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "========================================="

      - name: Write deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 镜像 | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 目标服务器 | \`${{ secrets.DEPLOY_HOST }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 触发方式 | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 源 SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 状态 | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Deployment Notification
    needs: [build-and-push, deploy]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Determine deployment result
        id: result
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "status=✅ 部署成功" >> "$GITHUB_OUTPUT"
            echo "emoji=🎉" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "status=❌ 部署失败（已触发回滚）" >> "$GITHUB_OUTPUT"
            echo "emoji=🚨" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "skipped" ]; then
            echo "status=⏭️ 部署已跳过" >> "$GITHUB_OUTPUT"
            echo "emoji=⏭️" >> "$GITHUB_OUTPUT"
          else
            echo "status=⚠️ 部署状态未知" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
          fi

      - name: Write notification summary
        run: |
          echo "## ${{ steps.result.outputs.emoji }} Deployment Notification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**状态**：${{ steps.result.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 构建 | ${{ needs.build-and-push.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 部署 | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 分支 | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 提交者 | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 提交信息 | ${{ github.event.head_commit.message }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Send webhook notification (optional)
        if: secrets.NOTIFICATION_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.NOTIFICATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ steps.result.outputs.emoji }} blog-navigation: ${{ steps.result.outputs.status }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }' || true

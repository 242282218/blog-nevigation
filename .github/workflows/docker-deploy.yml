name: Docker Build & Publish

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after a successful image build
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        run: npm run audit:high

      - name: Check environment files are not tracked
        run: npm run check:env

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Read package version for smoke image
        id: smoke-package-version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=smoke-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker smoke image
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: blog-navigation:smoke-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.smoke-package-version.outputs.version }}
            APP_IMAGE_TAG=${{ steps.smoke-package-version.outputs.image_tag }}
            APP_REVISION=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.smoke-package-version.outputs.build_time }}

      - name: Run Docker smoke test
        shell: bash
        run: |
          set -euo pipefail

          SMOKE_DATA_ROOT="${PWD}/.tmp/docker-smoke-data"
          mkdir -p "${SMOKE_DATA_ROOT}"

          docker run \
            --detach \
            --name blog-navigation-smoke \
            --publish 127.0.0.1:3210:3000 \
            --env EDITOR_ACCESS_TOKEN=smoke-secret \
            --env COOKIE_SECURE=false \
            --env BLOG_DATA_ROOT=/var/lib/blog-navigation \
            --env TRUSTED_PROXY_IPS='*' \
            --volume "${SMOKE_DATA_ROOT}:/var/lib/blog-navigation" \
            blog-navigation:smoke-${{ github.sha }}

          cleanup() {
            docker logs --tail=100 blog-navigation-smoke || true
            docker stop -t 10 blog-navigation-smoke >/dev/null 2>&1 || true
            docker rm blog-navigation-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_smoke() {
            for attempt in $(seq 1 30); do
              if curl --fail --silent --max-time 5 http://127.0.0.1:3210/ >/dev/null; then
                echo "Container responded after ${attempt} attempts."
                return 0
              fi

              if [ "${attempt}" -eq 30 ]; then
                echo "Container did not become ready."
                return 1
              fi

              sleep 2
            done
          }

          wait_for_smoke

          docker exec blog-navigation-smoke sh -c "find /app/content/seeds/posts -name '*.md' | grep -q ."
          docker exec blog-navigation-smoke sh -c "printf 'mounted-data' > /var/lib/blog-navigation/smoke-marker.txt"

          docker restart blog-navigation-smoke
          wait_for_smoke
          docker exec blog-navigation-smoke sh -c 'test "$(cat /var/lib/blog-navigation/smoke-marker.txt)" = "mounted-data"'

          test -f "${SMOKE_DATA_ROOT}/smoke-marker.txt"

          curl --fail --silent --show-error --max-time 10 --output /tmp/blog.html http://127.0.0.1:3210/blog
          curl --fail --silent --show-error --max-time 10 --output /tmp/navigation.html http://127.0.0.1:3210/navigation

      - name: Report Docker smoke image vulnerabilities with Trivy
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: blog-navigation:smoke-${{ github.sha }}
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Generate Trivy SARIF artifact
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: blog-navigation:smoke-${{ github.sha }}
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Enforce Docker smoke image vulnerabilities with Trivy
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: blog-navigation:smoke-${{ github.sha }}
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '1'

      - name: Upload Trivy scan artifact
        if: always()
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-smoke-sarif
          path: trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 7

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.candidate-build.outputs.digest }}

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to Container Registry
        # docker/login-action@v4
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: ${VERSION}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} must match package version v${VERSION}." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_tag=v${VERSION}-build.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            echo "runtime_image_tag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          else
            echo "runtime_image_tag=v${VERSION}-build.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Extract metadata
        id: meta
        # docker/metadata-action@v6
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=v${{ steps.package-version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.package-version.outputs.build_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ steps.package-version.outputs.runtime_image_tag }}
            org.opencontainers.image.title=blog-navigation
            org.opencontainers.image.description=Developer blog and navigation site built with Next.js
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Create candidate image tag
        id: candidate
        shell: bash
        run: |
          set -euo pipefail

          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_OUTPUT}"

      - name: Build and push candidate Docker image
        id: candidate-build
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.candidate.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.package-version.outputs.version }}
            APP_IMAGE_TAG=${{ steps.package-version.outputs.runtime_image_tag }}
            APP_REVISION=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.package-version.outputs.build_time }}
          provenance: true
          sbom: true

      - name: Run candidate Docker smoke test
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.candidate-build.outputs.digest }}
        run: |
          set -euo pipefail

          if [ -z "${{ steps.candidate-build.outputs.digest }}" ]; then
            echo "Candidate build did not produce an image digest."
            exit 1
          fi

          echo "Running smoke test against ${CANDIDATE_IMAGE}"
          docker pull "${CANDIDATE_IMAGE}"

          SMOKE_DATA_ROOT="${PWD}/.tmp/docker-candidate-smoke-data"
          mkdir -p "${SMOKE_DATA_ROOT}"

          docker run \
            --detach \
            --name blog-navigation-candidate-smoke \
            --publish 127.0.0.1:3211:3000 \
            --env EDITOR_ACCESS_TOKEN=smoke-secret \
            --env COOKIE_SECURE=false \
            --env BLOG_DATA_ROOT=/var/lib/blog-navigation \
            --env TRUSTED_PROXY_IPS='*' \
            --volume "${SMOKE_DATA_ROOT}:/var/lib/blog-navigation" \
            "${CANDIDATE_IMAGE}"

          cleanup() {
            docker logs --tail=100 blog-navigation-candidate-smoke || true
            docker stop -t 10 blog-navigation-candidate-smoke >/dev/null 2>&1 || true
            docker rm blog-navigation-candidate-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_smoke() {
            for attempt in $(seq 1 30); do
              if curl --fail --silent --max-time 5 http://127.0.0.1:3211/ >/dev/null; then
                echo "Container responded after ${attempt} attempts."
                return 0
              fi

              if [ "${attempt}" -eq 30 ]; then
                echo "Container did not become ready."
                return 1
              fi

              sleep 2
            done
          }

          wait_for_smoke

          docker exec blog-navigation-candidate-smoke sh -c "find /app/content/seeds/posts -name '*.md' | grep -q ."
          docker exec blog-navigation-candidate-smoke sh -c "printf 'mounted-data' > /var/lib/blog-navigation/smoke-marker.txt"

          docker restart blog-navigation-candidate-smoke
          wait_for_smoke
          docker exec blog-navigation-candidate-smoke sh -c 'test "$(cat /var/lib/blog-navigation/smoke-marker.txt)" = "mounted-data"'

          test -f "${SMOKE_DATA_ROOT}/smoke-marker.txt"

          curl --fail --silent --show-error --max-time 10 --output /tmp/blog-candidate.html http://127.0.0.1:3211/blog
          curl --fail --silent --show-error --max-time 10 --output /tmp/navigation-candidate.html http://127.0.0.1:3211/navigation

      - name: Report candidate image vulnerabilities with Trivy
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.candidate-build.outputs.digest }}
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Generate candidate Trivy SARIF artifact
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.candidate-build.outputs.digest }}
          scanners: vuln
          format: sarif
          output: trivy-candidate-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Enforce candidate image vulnerabilities with Trivy
        # aquasecurity/trivy-action@master
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.candidate-build.outputs.digest }}
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '1'

      - name: Upload candidate Trivy scan artifact
        if: always()
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-candidate-sarif
          path: trivy-candidate-results.sarif
          if-no-files-found: ignore
          retention-days: 7

      - name: Promote candidate digest to release tags
        shell: bash
        env:
          CANDIDATE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.candidate-build.outputs.digest }}
          RELEASE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          mapfile -t unique_tags < <(printf '%s\n' "${RELEASE_TAGS}" | sed '/^$/d' | sort -u)

          if [ "${#unique_tags[@]}" -eq 0 ]; then
            echo "No release tags were generated."
            exit 1
          fi

          printf 'Promoting candidate digest to %s unique tag(s):\n' "${#unique_tags[@]}"
          printf '  %s\n' "${unique_tags[@]}"

          for tag in "${unique_tags[@]}"; do
            echo "Promoting ${CANDIDATE_IMAGE} to ${tag}"
            docker buildx imagetools create \
              --tag "${tag}" \
              "${CANDIDATE_IMAGE}"
          done

      - name: Write Docker release summary
        shell: bash
        run: |
          {
            echo "## Docker Release"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |"
            echo "| Candidate | \`${{ steps.candidate.outputs.tag }}\` |"
            echo "| Digest | \`${{ steps.candidate-build.outputs.digest }}\` |"
            echo "| Latest | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |"
            echo "| Build tag | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.package-version.outputs.build_tag }}\` |"
            echo "| Commit tag | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${GITHUB_SHA::7}\` |"
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              echo "| Release tag | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.package-version.outputs.version }}\` |"
            else
              echo "| Release tag | Push git tag \`v${{ steps.package-version.outputs.version }}\` to publish \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.package-version.outputs.version }}\` |"
            fi
            echo
            echo "### Pull latest"
            echo
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
            echo
            echo "### Run latest"
            echo
            echo '```bash'
            echo "APP_DIR=/opt/blog-nevigation"
            echo "CONTAINER_NAME=blog-navigation"
            echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo 'docker stop -t 30 "${CONTAINER_NAME}" 2>/dev/null || true'
            echo 'docker rm "${CONTAINER_NAME}" 2>/dev/null || true'
            echo 'docker run -d \'
            echo '  --name "${CONTAINER_NAME}" \'
            echo '  --restart unless-stopped \'
            echo '  --init \'
            echo '  --env-file "${APP_DIR}/.env" \'
            echo '  -p 127.0.0.1:7199:3000 \'
            echo '  -v "${APP_DIR}/data:/var/lib/blog-navigation" \'
            echo '  "${IMAGE}"'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Production
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.SITE_URL || 'https://blog.example.com' }}

    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SITE_HOST: ${{ secrets.DEPLOY_SITE_HOST }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          target_host="${DEPLOY_HOST}"
          target_user="${DEPLOY_USER:-root}"
          target_port="${DEPLOY_PORT:-22}"
          target_path="${DEPLOY_PATH:-/opt/blog-nevigation}"
          site_host="${DEPLOY_SITE_HOST:-blog.999639.xyz}"

          if [ -z "${DEPLOY_SSH_KEY}" ] && [ -z "${DEPLOY_PASSWORD}" ]; then
            echo "::error::Set either DEPLOY_SSH_KEY or DEPLOY_PASSWORD."
            exit 1
          fi

          if [ -z "${target_host}" ]; then
            if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
              echo "::error::Set DEPLOY_HOST, or set CLOUDFLARE_API_TOKEN so the workflow can resolve ${site_host}."
              exit 1
            fi

            zone_name="$(awk -F. '{ print $(NF-1) "." $NF }' <<< "${site_host}")"
            zone_id="$(
              curl --fail --silent --show-error \
                --request GET \
                --url "https://api.cloudflare.com/client/v4/zones?name=${zone_name}" \
                --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                --header "Content-Type: application/json" \
              | jq -r '.result[0].id // empty'
            )"

            if [ -z "${zone_id}" ]; then
              echo "::error::Could not resolve Cloudflare zone for ${site_host}."
              exit 1
            fi

            target_host="$(
              curl --fail --silent --show-error \
                --request GET \
                --url "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records?name=${site_host}&per_page=1" \
                --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                --header "Content-Type: application/json" \
              | jq -r '.result[0].content // empty'
            )"

            if [ -z "${target_host}" ]; then
              echo "::error::Could not resolve DNS record for ${site_host}."
              exit 1
            fi
          fi

          echo "::add-mask::${target_host}"
          echo "host=${target_host}" >> "${GITHUB_OUTPUT}"
          echo "user=${target_user}" >> "${GITHUB_OUTPUT}"
          echo "port=${target_port}" >> "${GITHUB_OUTPUT}"
          echo "path=${target_path}" >> "${GITHUB_OUTPUT}"
          echo "site_host=${site_host}" >> "${GITHUB_OUTPUT}"
          echo "Resolved deployment target for ${site_host}."

      - name: Deploy via SSH
        # appleboy/ssh-action@v1
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ steps.target.outputs.user }}
          port: ${{ steps.target.outputs.port }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ steps.target.outputs.path }}"
            IMAGE_DIGEST="${{ needs.build-and-push.outputs.image-digest }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
            LAST_GOOD_DIGEST_FILE="${DEPLOY_DIR}/.last-good-digest"
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

            if [ -z "${IMAGE_DIGEST}" ]; then
              echo "Build did not produce an image digest; refusing to deploy."
              exit 1
            fi

            echo "========================================="
            echo "Deployment started at ${TIMESTAMP}"
            echo "Image: ${IMAGE}"
            echo "Deploy dir: ${DEPLOY_DIR}"
            echo "========================================="

            cd "${DEPLOY_DIR}"

            if [ ! -f "${DEPLOY_DIR}/.env" ]; then
              echo "Missing ${DEPLOY_DIR}/.env; refusing to deploy because runtime config must be preserved."
              exit 1
            fi

            get_healthcheck_url() {
              local port
              port=$(docker compose -f compose.prod.yaml port app 3000 | awk -F: 'END {print $NF}')
              echo "http://127.0.0.1:${port:-7199}/"
            }

            create_runtime_backup() {
              local backup_dir
              local backup_path

              backup_dir="${DEPLOY_DIR}/backups"
              backup_path="${backup_dir}/blog-navigation-runtime-$(date -u +%Y%m%dT%H%M%SZ).tgz"

              mkdir -p "${backup_dir}" "${DEPLOY_DIR}/data"
              echo "Creating runtime backup: ${backup_path}"
              tar -C "${DEPLOY_DIR}" -czf "${backup_path}" .env data

              find "${backup_dir}" -maxdepth 1 -type f -name 'blog-navigation-runtime-*.tgz' \
                | sort -r \
                | awk 'NR>10' \
                | while IFS= read -r old_backup; do
                    rm -f "${old_backup}"
                  done
            }

            wait_for_healthcheck() {
              local url="$1"
              local label="$2"

              echo "Waiting for ${label} health check at ${url}..."
              for i in $(seq 1 30); do
                if curl --fail --silent --max-time 5 "${url}" > /dev/null 2>&1; then
                  echo "${label} health check passed after $((i * 2)) seconds"
                  return 0
                fi
                sleep 2
              done

              echo "${label} health check failed."
              return 1
            }

            if [ -f "${LAST_GOOD_DIGEST_FILE}" ]; then
              PREV_DIGEST=$(tr -d '[:space:]' < "${LAST_GOOD_DIGEST_FILE}")
            else
              PREV_DIGEST="none"
            fi

            if [[ "${PREV_DIGEST}" != *@sha256:* ]]; then
              PREV_DIGEST="none"
            fi
            echo "Previous last-good image digest: ${PREV_DIGEST}"

            create_runtime_backup

            echo "Pulling latest image..."
            docker pull "${IMAGE}"

            echo "Restarting service..."
            DEPLOY_IMAGE="${IMAGE}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans
            HEALTHCHECK_URL=$(get_healthcheck_url)

            if ! wait_for_healthcheck "${HEALTHCHECK_URL}" "deployment"; then
              echo "========================================="
              echo "Health check failed, starting rollback."
              echo "========================================="

              docker compose -f compose.prod.yaml logs --tail=50 app || true

              if [[ "${PREV_DIGEST}" == *@sha256:* ]]; then
                echo "Rolling back image only to previous last-good digest: ${PREV_DIGEST}"
                DEPLOY_IMAGE="${PREV_DIGEST}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans
                ROLLBACK_HEALTHCHECK_URL=$(get_healthcheck_url)
                wait_for_healthcheck "${ROLLBACK_HEALTHCHECK_URL}" "rollback"
              else
                echo "No valid previous image digest is available; rollback skipped."
              fi

              exit 1
            fi

            printf '%s\n' "${IMAGE}" > "${LAST_GOOD_DIGEST_FILE}"

            echo "Cleaning up dangling images..."
            docker image prune -f || true

            echo "========================================="
            echo "Deployment successful at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "========================================="

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Summary"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}\` |"
            echo "| Target | \`${{ steps.target.outputs.site_host }}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Deployment Notification
    needs: [build-and-push, deploy]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Determine deployment result
        id: result
        shell: bash
        run: |
          case "${{ needs.deploy.result }}" in
            success)
              echo "status=Deployment succeeded" >> "$GITHUB_OUTPUT"
              ;;
            failure)
              echo "status=Deployment failed" >> "$GITHUB_OUTPUT"
              ;;
            skipped)
              echo "status=Deployment skipped" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "status=Deployment status unknown" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Write notification summary
        shell: bash
        run: |
          {
            echo "## Deployment Notification"
            echo
            echo "**Status**: ${{ steps.result.outputs.status }}"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Build | ${{ needs.build-and-push.result }} |"
            echo "| Deploy | ${{ needs.deploy.result }} |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send webhook notification
        continue-on-error: true
        shell: bash
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          if [ -z "${NOTIFICATION_WEBHOOK_URL}" ]; then
            echo "Webhook not configured; skipping."
            exit 0
          fi

          curl -s -X POST "${NOTIFICATION_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "blog-navigation: ${{ steps.result.outputs.status }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }' || true

name: Docker Build & Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after a successful image build
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Production
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.SITE_URL || 'https://blog.example.com' }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}"
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

            echo "========================================="
            echo "Deployment started at ${TIMESTAMP}"
            echo "Image: ${IMAGE}"
            echo "Deploy dir: ${DEPLOY_DIR}"
            echo "========================================="

            cd "${DEPLOY_DIR}"

            PREV_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$(docker compose -f compose.prod.yaml ps -q app 2>/dev/null)" 2>/dev/null || echo "none")
            echo "Previous image digest: ${PREV_DIGEST}"

            echo "Pulling latest image..."
            docker pull "${IMAGE}"

            echo "Restarting service..."
            DEPLOY_IMAGE="${IMAGE}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans

            echo "Waiting for health check..."
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl --fail --silent --max-time 5 http://127.0.0.1:3000/ > /dev/null 2>&1; then
                HEALTHY=true
                echo "Health check passed after $((i * 2)) seconds"
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" = "false" ]; then
              echo "========================================="
              echo "Health check failed, starting rollback."
              echo "========================================="

              docker compose -f compose.prod.yaml logs --tail=50 app || true

              if [ "${PREV_DIGEST}" != "none" ]; then
                echo "Rolling back to previous image: ${PREV_DIGEST}"
                DEPLOY_IMAGE="${PREV_DIGEST}" docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans
              fi

              exit 1
            fi

            echo "Cleaning up dangling images..."
            docker image prune -f || true

            echo "========================================="
            echo "Deployment successful at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "========================================="

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Summary"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}\` |"
            echo "| Target host | \`${{ secrets.DEPLOY_HOST }}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Deployment Notification
    needs: [build-and-push, deploy]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Determine deployment result
        id: result
        shell: bash
        run: |
          case "${{ needs.deploy.result }}" in
            success)
              echo "status=Deployment succeeded" >> "$GITHUB_OUTPUT"
              ;;
            failure)
              echo "status=Deployment failed" >> "$GITHUB_OUTPUT"
              ;;
            skipped)
              echo "status=Deployment skipped" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "status=Deployment status unknown" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Write notification summary
        shell: bash
        run: |
          {
            echo "## Deployment Notification"
            echo
            echo "**Status**: ${{ steps.result.outputs.status }}"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Build | ${{ needs.build-and-push.result }} |"
            echo "| Deploy | ${{ needs.deploy.result }} |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send webhook notification
        continue-on-error: true
        shell: bash
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          if [ -z "${NOTIFICATION_WEBHOOK_URL}" ]; then
            echo "Webhook not configured; skipping."
            exit 0
          fi

          curl -s -X POST "${NOTIFICATION_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "blog-navigation: ${{ steps.result.outputs.status }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }' || true

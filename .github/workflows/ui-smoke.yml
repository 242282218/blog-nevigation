name: UI Smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ui-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-smoke.txt

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python smoke dependencies
        run: python -m pip install -r requirements-smoke.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run public UI smoke
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p output
          PORT=3210 HOSTNAME=127.0.0.1 node node_modules/next/dist/bin/next start > output/ui-smoke-server.log 2>&1 &
          server_pid=$!

          cleanup() {
            kill "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 45); do
            if curl --fail --silent --max-time 5 http://127.0.0.1:3210/ >/dev/null; then
              echo "Application responded after ${attempt} attempts."
              break
            fi

            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "Application server exited before becoming ready."
              cat output/ui-smoke-server.log
              exit 1
            fi

            if [ "${attempt}" -eq 45 ]; then
              echo "Application did not become ready."
              cat output/ui-smoke-server.log
              exit 1
            fi

            sleep 2
          done

          BASE_URL=http://127.0.0.1:3210 npm run smoke:public

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-smoke-artifacts
          path: |
            output/playwright
            output/ui-smoke-server.log
          if-no-files-found: ignore
          retention-days: 7

name: UI Smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ui-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/test/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python smoke dependencies
        run: python -m pip install -r scripts/test/requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run UI smoke
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p output
          SMOKE_DATA_ROOT="${PWD}/.tmp/ui-smoke-data"
          export SMOKE_DATA_ROOT
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const root = process.env.SMOKE_DATA_ROOT;
          const now = new Date().toISOString();

          fs.mkdirSync(path.join(root, 'articles'), { recursive: true });
          fs.mkdirSync(path.join(root, 'navigation'), { recursive: true });
          fs.mkdirSync(path.join(root, 'settings'), { recursive: true });
          fs.writeFileSync(
            path.join(root, 'settings', 'app-runtime.json'),
            `${JSON.stringify({
              version: 1,
              setupCompletedAt: now,
              publicSiteUrl: 'http://127.0.0.1:3210',
              cookieSecure: false,
              trustedProxyIps: ['*'],
              dataRoot: {
                path: root,
                pendingPath: null,
                requiresRestart: false,
              },
              updatedAt: now,
            }, null, 2)}\n`,
            'utf8'
          );
          NODE

          PORT=3210 HOSTNAME=127.0.0.1 BLOG_DATA_ROOT="${SMOKE_DATA_ROOT}" EDITOR_ACCESS_TOKEN=ci-smoke-secret COOKIE_SECURE=false TRUSTED_PROXY_IPS='*' setsid npm run start > output/ui-smoke-server.log 2>&1 &
          server_pid=$!

          cleanup() {
            kill -TERM "-${server_pid}" >/dev/null 2>&1 || kill "${server_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 45); do
            if curl --fail --silent --max-time 5 http://127.0.0.1:3210/ >/dev/null; then
              echo "Application responded after ${attempt} attempts."
              break
            fi

            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "Application server exited before becoming ready."
              cat output/ui-smoke-server.log
              exit 1
            fi

            if [ "${attempt}" -eq 45 ]; then
              echo "Application did not become ready."
              cat output/ui-smoke-server.log
              exit 1
            fi

            sleep 2
          done

          npx --yes @lhci/cli@0.15.1 autorun --config=./lighthouserc.cjs
          BASE_URL=http://127.0.0.1:3210 EDITOR_LOGIN_SECRET=ci-smoke-secret npm run smoke:ui

      - name: Upload smoke artifacts
        if: always()
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ui-smoke-artifacts
          path: |
            output/playwright
            output/lighthouse
            output/*.html
            output/*.png
            output/ui-smoke-server.log
          if-no-files-found: ignore
          retention-days: 7

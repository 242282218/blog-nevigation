services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BLOG_DATA_ROOT: /var/lib/blog-navigation
      EDITOR_ACCESS_TOKEN: ${EDITOR_ACCESS_TOKEN}
    volumes:
      - blog_articles:/var/lib/blog-navigation/articles
      - blog_navigation:/var/lib/blog-navigation/navigation
    restart: unless-stopped

volumes:
  blog_articles:
    name: blog_navigation_articles
  blog_navigation:
    name: blog_navigation_data

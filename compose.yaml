services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-7199}:3000"
    environment:
      NODE_ENV: production
      BLOG_DATA_ROOT: /var/lib/blog-navigation
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      EDITOR_ACCESS_TOKEN: ${EDITOR_ACCESS_TOKEN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      R2_BACKUP_ENABLED: ${R2_BACKUP_ENABLED:-false}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BACKUP_ENCRYPTION_PASSPHRASE: ${R2_BACKUP_ENCRYPTION_PASSPHRASE:-}
      R2_PREFIX: ${R2_PREFIX:-blog-navigation}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_SNAPSHOT_ON_WRITE: ${R2_SNAPSHOT_ON_WRITE:-false}
    volumes:
      - ./data:/var/lib/blog-navigation
    restart: unless-stopped

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BLOG_DATA_ROOT: /var/lib/blog-navigation
      EDITOR_ACCESS_TOKEN: ${EDITOR_ACCESS_TOKEN}
    volumes:
      - /root/blog-navigation/articles:/var/lib/blog-navigation/articles
      - /root/blog-navigation/navigation:/var/lib/blog-navigation/navigation
    restart: unless-stopped

# ================================================================
# 生产部署用 Docker Compose 文件
# 使用说明：
#   1. 将此文件复制到服务器部署目录（DEPLOY_PATH）
#   2. 在同目录下创建 .env 文件，配置 EDITOR_ACCESS_TOKEN
#      或 EDITOR_RUNTIME_AUTH_SETUP_TOKEN
#   3. GitHub Actions 会自动通过 SSH 使用此文件部署
#
# 注意：此文件使用 GHCR 远程镜像，不在服务器上构建
# ================================================================

services:
  app:
    # 镜像地址：由 GitHub Actions 构建并推送到 GHCR
    # 镜像名会自动取 github.repository 的小写形式
    # 例如：ghcr.io/username/blog-nevigation:latest
    image: ${DEPLOY_IMAGE:-ghcr.io/242282218/blog-nevigation:latest}
    container_name: blog-navigation
    init: true
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BLOG_DATA_ROOT: /var/lib/blog-navigation
      NEXT_TELEMETRY_DISABLED: 1
      EDITOR_ACCESS_TOKEN: ${EDITOR_ACCESS_TOKEN:-}
      EDITOR_RUNTIME_AUTH_SETUP_TOKEN: ${EDITOR_RUNTIME_AUTH_SETUP_TOKEN:-}
      EDITOR_ALLOW_RUNTIME_AUTH_SETUP: ${EDITOR_ALLOW_RUNTIME_AUTH_SETUP:-false}
      # 公网生产默认要求 HTTPS Secure Cookie；仅内网/临时 HTTP 调试显式设为 false
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # 可信反向代理 IP 列表；配置后登录/搜索限流会按真实客户端 IP 分桶
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      # 可选：Cloudflare R2 远端备份
      R2_BACKUP_ENABLED: ${R2_BACKUP_ENABLED:-false}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_PREFIX: ${R2_PREFIX:-blog-navigation}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_SNAPSHOT_ON_WRITE: ${R2_SNAPSHOT_ON_WRITE:-false}
      R2_BACKUP_ENCRYPTION_KEY: ${R2_BACKUP_ENCRYPTION_KEY:-}
      R2_ALLOW_PLAINTEXT_BACKUP: ${R2_ALLOW_PLAINTEXT_BACKUP:-false}
    volumes:
      # 数据持久化：整个数据根目录单点挂载，迁移时复制 ./data 即可
      - ./data:/var/lib/blog-navigation
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001,mode=0770
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    restart: unless-stopped
    # 容器内健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # 资源限制（防止实例 OOM 影响宿主机）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # 日志配置（防止日志文件无限膨胀）
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- 像素化滤镜 -->
    <filter id="pixelate" x="0" y="0" width="100%" height="100%">
      <feFlood x="0" y="0" width="4" height="4" flood-color="#d4a57a" flood-opacity="1"/>
      <feComposite width="10" height="10"/>
      <feTile result="a"/>
      <feComposite in="SourceGraphic" in2="a" operator="in"/>
      <feMorphology operator="dilate" radius="5"/>
    </filter>
    
    <!-- 渐变定义 -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a57a"/>
      <stop offset="100%" style="stop-color:#b88b5e"/>
    </linearGradient>
    
    <!-- 裁剪路径 - 用于逐行显示 -->
    <clipPath id="lineClip">
      <rect x="0" y="0" width="100" height="0">
        <animate attributeName="height" from="0" to="100" dur="0.6s" begin="0.8s" fill="freeze" calcMode="easeOut"/>
      </rect>
    </clipPath>
  </defs>
  
  <!-- 背景 -->
  <rect width="100" height="100" rx="12" fill="url(#brandGradient)"/>
  
  <!-- 像素化层 - 初始显示，然后淡出 -->
  <g opacity="1">
    <rect x="20" y="20" width="60" height="60" fill="white" filter="url(#pixelate)" opacity="0.3">
      <animate attributeName="opacity" from="0.3" to="0" dur="0.8s" begin="0s" fill="freeze" calcMode="easeIn"/>
    </rect>
    <animateTransform attributeName="transform" type="scale" from="0.8" to="1" dur="0.8s" begin="0s" fill="freeze" calcMode="easeOut"/>
  </g>
  
  <!-- 主内容 - 逐行显示 -->
  <g clip-path="url(#lineClip)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    
    <!-- 终端提示符 > -->
    <text x="35" y="58" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="32" font-weight="700" fill="white" text-anchor="middle">
      &gt;
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.5;1" dur="0.4s" begin="0.8s" fill="freeze"/>
    </text>
    
    <!-- 下划线 _ -->
    <rect x="55" y="52" width="14" height="4" fill="white" rx="1">
      <animate attributeName="width" from="0" to="14" dur="0.3s" begin="1.0s" fill="freeze" calcMode="easeOut"/>
    </rect>
  </g>
  
  <!-- 光标闪烁 - 动画完成后 -->
  <rect x="72" y="42" width="3" height="20" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.5;0.6;1" dur="1.2s" begin="1.4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 整体淡入 -->
  <animateTransform attributeName="transform" type="scale" values="0.95;1" dur="0.8s" begin="0s" fill="freeze" calcMode="easeOut"/>
</svg>